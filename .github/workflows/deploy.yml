name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Install wget
        run: sudo apt-get update -qq && sudo apt-get install -y -qq wget

      - name: Build local projects
        run: bash scripts/deploy-local.sh

      - name: Run tests
        run: npm test

      - run: npm run build
        env:
          VITE_AMAP_KEY: ${{ secrets.VITE_AMAP_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=hub --branch=main
